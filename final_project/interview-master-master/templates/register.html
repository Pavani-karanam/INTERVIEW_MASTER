{% extends 'base.html' %}
{% block title %}Register - Interview Master{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-bg">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <a href="{{ url_for('index') }}" class="auth-logo">
                    <i class="fas fa-bolt"></i>
                    <span>Interview<strong>Master</strong></span>
                </a>
                <h1>Create Account</h1>
                <p>Start your interview preparation journey</p>
            </div>
            <form method="POST" action="{{ url_for('register') }}" class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="full_name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="John Doe" required
                        autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email">
                </div>
                <div class="form-group text-left">
                    <label for="role"><i class="fas fa-briefcase"></i> Your Role</label>
                    <div class="select-wrap">
                        <select id="role" name="role" required class="form-select">
                            <option value="" disabled selected>Select Your Current Role</option>
                            <option value="Candidate">Candidate</option>
                            <option value="Student">Student</option>
                            <option value="Recruiter">Recruiter</option>
                            <option value="HR Manager">HR Manager</option>
                            <option value="Professional">Professional</option>
                        </select>
                        <i class="fas fa-chevron-down select-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" placeholder="Min 6 characters" required
                            minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-shield-alt"></i> Confirm Password</label>
                    <div class="password-wrap">
                        <input type="password" id="confirm_password" name="confirm_password"
                            placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle"
                            onclick="togglePassword('confirm_password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="registerSubmitBtn">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
