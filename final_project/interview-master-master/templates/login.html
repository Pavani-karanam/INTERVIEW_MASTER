{% extends 'base.html' %}
{% block title %}Login - Interview Master{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-bg">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <a href="{{ url_for('index') }}" class="auth-logo">
                    <i class="fas fa-bolt"></i>
                    <span>Interview<strong>Master</strong></span>
                </a>
                <h1>Welcome Back</h1>
                <p>Sign in to continue your interview prep</p>
            </div>
            <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required
                            autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginSubmitBtn">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
